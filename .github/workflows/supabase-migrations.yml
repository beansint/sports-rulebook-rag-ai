name: Supabase Migrations

on:
  pull_request:
    branches: [dev, main]
    paths:
      - "supabase/migrations/*.sql"
  push:
    branches: [main]
    paths:
      - "supabase/migrations/*.sql"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check migration naming
        run: .github/scripts/check-migration-names.sh

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Dry-run migration push
        run: supabase db push --linked --dry-run

  deploy:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check migration naming
        run: .github/scripts/check-migration-names.sh

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Apply migrations
        run: supabase db push --linked
