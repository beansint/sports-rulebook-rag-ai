name: Vercel Preview Deploy

on:
  pull_request:
    branches: [dev, main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: vercel-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    if: github.event.pull_request.draft == false && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Pull Vercel project settings
        run: pnpm dlx vercel@latest pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build deployment artifact
        run: pnpm dlx vercel@latest build --token="$VERCEL_TOKEN"

      - name: Deploy preview
        id: deploy
        run: |
          url=$(pnpm dlx vercel@latest deploy --prebuilt --token="$VERCEL_TOKEN")
          echo "deployment_url=$url" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const body = `Preview deployment: ${process.env.DEPLOYMENT_URL}`;
            const issue_number = context.issue.number;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body,
            });
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment_url }}
